name: "ia-bot-ahmed GitHub Action"
description: "Run ia-bot-ahmed in GitHub Actions workflows"
branding:
  icon: "code"
  color: "orange"

inputs:
  model:
    description: "Model to use"
    required: true

  agent:
    description: "Agent to use. Must be a primary agent. Falls back to default_agent from config or 'build' if not found."
    required: false

  share:
    description: "Share the ia-bot-ahmed session (defaults to true for public repos)"
    required: false

  prompt:
    description: "Custom prompt to override the default prompt"
    required: false

  use_github_token:
    description: "Use GITHUB_TOKEN directly instead of ia-bot-ahmed App token exchange. When true, skips OIDC and uses the GITHUB_TOKEN env var."
    required: false
    default: "false"

  mentions:
    description: "Comma-separated list of trigger phrases (case-insensitive). Defaults to '/ia-bot-ahmed,/oc'"
    required: false

  variant:
    description: "Model variant for provider-specific reasoning effort (e.g., high, max, minimal)"
    required: false

  oidc_base_url:
    description: "Base URL for OIDC token exchange API. Only required when running a custom GitHub App install. Defaults to https://api.ia-bot-ahmed.app"
    required: false

runs:
  using: "composite"
  steps:
    - name: Get ia-bot-ahmed version
      id: version
      shell: bash
      run: |
        VERSION=$(curl -sf https://api.github.com/repos/anomalyco/ia-bot-ahmed/releases/latest | grep -o '"tag_name": *"[^"]*"' | cut -d'"' -f4)
        echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

    - name: Cache ia-bot-ahmed
      id: cache
      uses: actions/cache@v4
      with:
        path: ~/.ia-bot-ahmed/bin
        key: ia-bot-ahmed-${{ runner.os }}-${{ runner.arch }}-${{ steps.version.outputs.version }}

    - name: Install ia-bot-ahmed
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      run: curl -fsSL https://ia-bot-ahmed.app/install | bash

    - name: Add ia-bot-ahmed to PATH
      shell: bash
      run: echo "$HOME/.ia-bot-ahmed/bin" >> $GITHUB_PATH

    - name: Run ia-bot-ahmed
      shell: bash
      id: run_ia-bot-ahmed
      run: ia-bot-ahmed github run
      env:
        MODEL: ${{ inputs.model }}
        AGENT: ${{ inputs.agent }}
        SHARE: ${{ inputs.share }}
        PROMPT: ${{ inputs.prompt }}
        USE_GITHUB_TOKEN: ${{ inputs.use_github_token }}
        MENTIONS: ${{ inputs.mentions }}
        VARIANT: ${{ inputs.variant }}
        OIDC_BASE_URL: ${{ inputs.oidc_base_url }}
